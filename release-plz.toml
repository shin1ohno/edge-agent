[workspace]
changelog_update = true
pr_branch_prefix = "release-plz/"

# weave-contracts is consumed off-repo by weave-server via crates.io;
# edge-agent is the installable binary (`cargo install edge-agent`) and
# inlines its former submodules (edge-core / adapter-roon / adapter-hue)
# as internal modules so it has no private workspace dependencies.
[[package]]
name = "weave-contracts"
publish = true

[[package]]
name = "edge-agent"
publish = true
