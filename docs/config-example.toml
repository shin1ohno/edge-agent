# edge-agent bootstrap config template.
#
# Install location (default): $XDG_CONFIG_HOME/edge-agent/config.toml
#                              (i.e. ~/.config/edge-agent/config.toml)
# Alternative:                 /etc/edge-agent/config.toml
# Override:                    $EDGE_AGENT_CONFIG or pass the path as argv[1]
#
# Any field below can also be set via EDGE_AGENT_* env vars (e.g.
# EDGE_AGENT_EDGE_ID, EDGE_AGENT_ROON_HOST). Env vars take precedence over
# the TOML values.

edge_id = "living-room"
config_server_url = "ws://weave.lan:3001/ws/edge"

[roon]
# Roon Core is usually discovered via SOOD; set these to skip discovery.
# host = "192.168.1.20"
# port = 9330
extension_id = "com.shin1ohno.edge-agent.living-room"
display_name = "edge-agent (living-room)"

[nuimo]
# Optional: pin a specific Nuimo by BLE address. Otherwise the first one found is used.
# ble_address = "C3:81:DF:4E:FF:6A"

# Uncomment to enable the Hue adapter. The mere presence of the [hue] header
# turns it on; `token_path` is optional and defaults to
# $XDG_STATE_HOME/edge-agent/hue-token.json. Create the token with
# `edge-agent pair-hue`. If the resolved file is missing or unreadable the
# adapter logs a warning and stays disabled.
# [hue]
# token_path = "/absolute/path/to/hue-token.json"
